<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      lang="uk">
<head>
    <title>Завершення реєстрації &mdash; ВПО Платформа</title>
</head>
<body>
<main>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-2 fw-bold">Майже готово!</h3>
                    <p class="text-center text-muted mb-4">
                        Вітаємо, <strong th:text="${name}"></strong>! Оберіть свою роль на платформі.
                    </p>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/auth/oauth2/complete}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-4">
                            <div class="row g-2">
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="role" id="roleVPO" value="VPO" required>
                                    <label class="btn btn-outline-warning w-100 py-3" for="roleVPO">
                                        <i class="bi bi-hand-index-thumb d-block fs-4 mb-1"></i>
                                        Отримати допомогу
                                    </label>
                                </div>
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="role" id="roleProvider" value="PROVIDER">
                                    <label class="btn btn-outline-success w-100 py-3" for="roleProvider">
                                        <i class="bi bi-gift d-block fs-4 mb-1"></i>
                                        Надати допомогу
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div id="providerTypeSection" class="mb-4 d-none">
                            <div class="row g-2">
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="providerType" id="typeVol" value="VOLUNTEER">
                                    <label class="btn btn-outline-primary w-100 py-2" for="typeVol">
                                        <i class="bi bi-person-heart d-block mb-1"></i>Волонтер
                                    </label>
                                </div>
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="providerType" id="typeOrg" value="ORGANIZATION">
                                    <label class="btn btn-outline-primary w-100 py-2" for="typeOrg">
                                        <i class="bi bi-building d-block mb-1"></i>Організація
                                    </label>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-check2 me-2"></i>Завершити реєстрацію
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.querySelectorAll('input[name="role"]').forEach(r => {
    r.addEventListener('change', function() {
        document.getElementById('providerTypeSection').classList.toggle('d-none', this.value !== 'PROVIDER');
    });
});
</script>
</main>
</body>
</html>
