<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      lang="uk">
<head>
    <title>Результат оплати &mdash; ВПО Платформа</title>
</head>
<body>
<main>
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <i class="bi bi-check-circle-fill text-success fs-1 mb-3"></i>
            <h4 class="fw-bold mb-2">Дякуємо за підтримку!</h4>
            <p class="text-muted">Ваш внесок допоможе тим, хто цього найбільше потребує.</p>
            <a th:if="${announcement != null}"
               th:href="@{/announcements/{id}(id=${announcement.id})}"
               class="btn btn-primary mt-3">
                Повернутись до оголошення
            </a>
            <a href="/" class="btn btn-outline-secondary mt-3 ms-2">На головну</a>
        </div>
    </div>
</div>
</main>
</body>
</html>
