<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      lang="uk">
<head>
    <title>Оплата &mdash; ВПО Платформа</title>
</head>
<body>
<main>
<div class="container py-5 text-center">
    <p class="text-muted">Перенаправлення до сторінки оплати...</p>
    <form id="liqpayForm" method="POST" action="https://www.liqpay.ua/api/3/checkout" accept-charset="utf-8">
        <input type="hidden" name="data" th:value="${data}">
        <input type="hidden" name="signature" th:value="${signature}">
    </form>
    <script>document.getElementById('liqpayForm').submit();</script>
</div>
</main>
</body>
</html>
