<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      lang="uk">
<head>
    <title>Мої оголошення &mdash; ВПО Платформа</title>
</head>
<body>
<main>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">Мої оголошення</h3>
        <a href="/announcements/new" class="btn btn-primary">
            <i class="bi bi-plus-circle me-2"></i>Нове оголошення
        </a>
    </div>
    <div th:if="${#lists.isEmpty(announcements)}" class="empty-state">
        <i class="bi bi-megaphone empty-icon"></i>
        <h5>Немає оголошень</h5>
        <p>Ви ще не створили жодного оголошення</p>
        <a href="/announcements/new" class="btn btn-primary px-4">
            <i class="bi bi-plus-circle me-2"></i>Створити оголошення
        </a>
    </div>
    <div class="row g-3" th:unless="${#lists.isEmpty(announcements)}">
        <div th:each="a : ${announcements}" class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="fw-bold mb-1" th:text="${a.title}"></h6>
                            <div class="d-flex gap-2">
                                <span th:class="${a.type.name() == 'OFFER'} ? 'badge bg-success' : 'badge bg-warning text-dark'"
                                      th:text="${a.type.name() == 'OFFER'} ? 'Пропозиція' : 'Запит'"></span>
                                <span th:switch="${a.status.name()}">
                                    <span th:case="'PENDING'" class="badge bg-secondary">На модерації</span>
                                    <span th:case="'PUBLISHED'" class="badge bg-success">Опубліковано</span>
                                    <span th:case="'ARCHIVED'" class="badge bg-warning text-dark">Архів</span>
                                    <span th:case="'REJECTED'" class="badge bg-danger">Відхилено</span>
                                    <span th:case="'COMPLETED'" class="badge bg-info">Завершено</span>
                                </span>
                            </div>
                        </div>
                        <div class="d-flex gap-1">
                            <a th:href="@{/announcements/{id}(id=${a.id})}" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:if="${a.status.name() != 'COMPLETED'}"
                               th:href="@{/announcements/{id}/edit(id=${a.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
