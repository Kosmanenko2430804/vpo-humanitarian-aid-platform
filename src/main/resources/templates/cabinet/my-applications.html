<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      lang="uk">
<head>
    <title>Заявки на мої оголошення &mdash; ВПО Платформа</title>
</head>
<body>
<main>
<div class="container py-4">
    <div class="row">
        <div th:replace="~{cabinet/sidebar :: sidebar}"></div>

        <div class="col-md-9">
            <h3 class="fw-bold mb-4" th:text="${user.role.name() == 'VPO'} ? 'Мої заявки' : 'Заявки на мої оголошення'"></h3>

            <!-- VPO: My submitted applications -->
            <div th:if="${user.role.name() == 'VPO'}">
                <div th:if="${#lists.isEmpty(myApplications)}" class="text-muted">Ви ще не подавали заявок</div>
                <div class="row g-3" th:unless="${#lists.isEmpty(myApplications)}">
                    <div th:each="app : ${myApplications}" class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <h6 class="fw-bold" th:text="${app.announcement.title}"></h6>
                                        <p class="text-muted small mb-1" th:text="${app.message}"></p>
                                        <div th:if="${app.status.name() == 'ACCEPTED'}" class="mt-1">
                                            <small class="text-success">
                                                <span th:if="${app.pickupDate != null}"> Дата: <span th:text="${#temporals.format(app.pickupDate, 'dd.MM.yyyy HH:mm')}"></span></span>
                                                <span th:if="${app.pickupLocation != null and not #strings.isEmpty(app.pickupLocation)}"> | Місце: <span th:text="${app.pickupLocation}"></span></span>
                                                <span th:if="${app.providerPhone != null and not #strings.isEmpty(app.providerPhone)}"> | Тел.: <span th:text="${app.providerPhone}"></span></span>
                                            </small>
                                        </div>
                                    </div>
                                    <span th:switch="${app.status.name()}">
                                        <span th:case="'PENDING'" class="badge bg-secondary">Очікує на розгляд</span>
                                        <span th:case="'ACCEPTED'" class="badge bg-success">Прийнято</span>
                                        <span th:case="'REJECTED'" class="badge bg-danger">Відхилено</span>
                                        <span th:case="'COMPLETED'" class="badge bg-info">Завершено</span>
                                    </span>
                                </div>
                                <div th:if="${app.status.name() == 'COMPLETED' && app.rating == null}" class="mt-3 border-top pt-3">
                                    <h6 class="small fw-bold">Залишити відгук</h6>
                                    <form th:action="@{/applications/{id}/review(id=${app.id})}" method="post" class="row g-2">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <div class="col-auto">
                                            <select name="rating" class="form-select form-select-sm" required>
                                                <option value="">Оцінка</option>
                                                <option value="5">⭐⭐⭐⭐⭐ Відмінно</option>
                                                <option value="4">⭐⭐⭐⭐ Добре</option>
                                                <option value="3">⭐⭐⭐ Нормально</option>
                                                <option value="2">⭐⭐ Погано</option>
                                                <option value="1">⭐ Дуже погано</option>
                                            </select>
                                        </div>
                                        <div class="col">
                                            <input type="text" name="review" class="form-control form-control-sm"
                                                   placeholder="Ваш відгук (необов'язково)">
                                        </div>
                                        <div class="col-auto">
                                            <button type="submit" class="btn btn-sm btn-warning">Відправити</button>
                                        </div>
                                    </form>
                                </div>
                                <div th:if="${app.rating != null}" class="mt-2">
                                    <small class="text-warning">
                                        <span th:text="${'⭐'.repeat(app.rating)}"></span>
                                        <span th:text="${app.review}" class="text-muted ms-1"></span>
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PROVIDER: Received applications -->
            <div th:if="${user.role.name() == 'PROVIDER'}">
                <div th:if="${#lists.isEmpty(receivedApplications)}" class="text-muted">Немає заявок</div>
                <div class="row g-3" th:unless="${#lists.isEmpty(receivedApplications)}">
                    <div th:each="app : ${receivedApplications}" class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div class="flex-grow-1">
                                        <h6 class="fw-bold mb-1">
                                            <span th:text="${app.applicant.fullName}"></span>
                                            <small class="text-muted ms-2" th:text="${app.announcement.title}"></small>
                                        </h6>
                                        <p class="text-muted small mb-0" th:text="${app.message}"></p>
                                    </div>
                                    <span th:switch="${app.status.name()}">
                                        <span th:case="'PENDING'" class="badge bg-secondary ms-2">Нова</span>
                                        <span th:case="'ACCEPTED'" class="badge bg-success ms-2">Прийнято</span>
                                        <span th:case="'REJECTED'" class="badge bg-danger ms-2">Відхилено</span>
                                        <span th:case="'COMPLETED'" class="badge bg-info ms-2">Завершено</span>
                                    </span>
                                </div>
                                <div th:if="${app.status.name() == 'PENDING'}" class="mt-3 border-top pt-2">
                                    <div class="row g-2">
                                        <div class="col-md-8">
                                            <form th:action="@{/applications/{id}/accept(id=${app.id})}" method="post" class="row g-1">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <div class="col-md-4">
                                                    <input type="datetime-local" name="pickupDate" class="form-control form-control-sm" placeholder="Дата зустрічі" required>
                                                </div>
                                                <div class="col-md-4">
                                                    <input type="text" name="pickupLocation" class="form-control form-control-sm" placeholder="Місце" required>
                                                </div>
                                                <div class="col-md-3">
                                                    <input type="tel" name="providerPhone" class="form-control form-control-sm" placeholder="Телефон" required>
                                                </div>
                                                <div class="col-auto">
                                                    <button type="submit" class="btn btn-sm btn-success">Прийняти</button>
                                                </div>
                                            </form>
                                        </div>
                                        <div class="col-md-4">
                                            <form th:action="@{/applications/{id}/reject(id=${app.id})}" method="post" class="d-flex gap-1">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <input type="text" name="reason" class="form-control form-control-sm" required placeholder="Причина відмови">
                                                <button type="submit" class="btn btn-sm btn-danger">Відхилити</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                                <div th:if="${app.status.name() == 'ACCEPTED'}" class="mt-2">
                                    <form th:action="@{/applications/{id}/complete(id=${app.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-info"
                                                onclick="return confirm('Позначити як завершено?')">Завершено</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
