<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      lang="uk">
<head>
    <title>Сповіщення &mdash; ВПО Платформа</title>
</head>
<body>
<main>
<div class="container py-4">
    <div class="row">
        <div th:replace="~{cabinet/sidebar :: sidebar}"></div>

        <div class="col-md-9">
            <h3 class="fw-bold mb-4">Сповіщення</h3>
            <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-5">
                <p class="text-muted">Немає сповіщень</p>
            </div>
            <div class="list-group shadow-sm" th:unless="${#lists.isEmpty(notifications)}">
                <div th:each="n : ${notifications}"
                     th:class="${!n.isRead} ? 'list-group-item list-group-item-action list-group-item-light' : 'list-group-item list-group-item-action'">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span th:if="${!n.isRead}" class="badge bg-primary me-2">Нове</span>
                            <span th:text="${n.message}"></span>
                        </div>
                        <small class="text-muted ms-3" th:text="${#temporals.format(n.createdAt, 'dd.MM.yyyy HH:mm')}"></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
