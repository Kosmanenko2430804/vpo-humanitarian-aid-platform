<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>
<div th:fragment="sidebar" class="col-md-3">
    <div class="card shadow-sm mb-4">
        <div class="card-body text-center p-4">
            <h6 class="fw-bold mt-2" th:text="${user.fullName}"></h6>
            <p class="text-muted small mb-1" th:text="${user.email}"></p>
            <span th:class="${user.role.name() == 'VPO'} ? 'badge bg-warning text-dark' :
                           (${user.role.name() == 'PROVIDER'} ? 'badge bg-success' : 'badge bg-danger')"
                  th:text="${user.role.name() == 'VPO'} ? 'ВПО' :
                           (${user.role.name() == 'PROVIDER'} ? (${user.providerType != null && user.providerType.name() == 'ORGANIZATION'} ? 'Організація' : 'Волонтер') : 'Адміністратор')"></span>
        </div>
        <ul class="list-group list-group-flush sidebar-nav">
            <li th:classappend="${requestURI == '/cabinet/announcements'} ? 'active-item'" class="list-group-item">
                <a href="/cabinet/announcements" class="text-decoration-none text-dark">Мої оголошення</a>
            </li>
            <li th:classappend="${requestURI == '/cabinet/applications'} ? 'active-item'" class="list-group-item">
                <a href="/cabinet/applications" class="text-decoration-none text-dark">Заявки</a>
            </li>
            <li th:classappend="${requestURI == '/cabinet/notifications'} ? 'active-item'" class="list-group-item">
                <a href="/cabinet/notifications" class="text-decoration-none text-dark">
                    Сповіщення
                    <span th:if="${unreadCount > 0}" class="badge bg-danger rounded-pill"
                          th:text="${unreadCount}"></span>
                </a>
            </li>
            <li th:classappend="${requestURI == '/cabinet/profile'} ? 'active-item'" class="list-group-item">
                <a href="/cabinet/profile" class="text-decoration-none text-dark">Профіль</a>
            </li>
            <li class="list-group-item">
                <form th:action="@{/auth/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-link text-decoration-none text-danger p-0">Вийти</button>
                </form>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
