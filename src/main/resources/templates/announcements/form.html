<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      lang="uk">
<head>
    <title th:text="${announcement != null} ? 'Редагувати оголошення' : 'Нове оголошення'">Оголошення</title>
</head>
<body>
<main>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-4" th:text="${announcement != null} ? 'Редагувати оголошення' : 'Нове оголошення'"></h3>

                    <form th:action="${announcement != null} ? @{/announcements/{id}/edit(id=${announcement.id})} : @{/announcements/new}"
                          method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Заголовок *</label>
                            <input type="text" name="title" class="form-control" required
                                   th:value="${announcement?.title}" placeholder="Назва оголошення">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Опис *</label>
                            <textarea name="description" class="form-control" rows="5" required
                                      placeholder="Детальний опис..."><span th:text="${announcement?.description}"></span></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Місто *</label>
                            <input type="text" name="city" class="form-control" required
                                   th:value="${announcement?.city}" placeholder="Київ">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Категорії *</label>
                            <div class="row g-2" id="categoriesGroup">
                                <div th:each="cat : ${categories}" class="col-md-4">
                                    <div class="form-check">
                                        <input class="form-check-input category-check" type="checkbox"
                                               name="categoryIds" th:value="${cat.id}"
                                               th:id="'cat' + ${cat.id}"
                                               th:checked="${announcement != null && announcement.categories.contains(cat)}">
                                        <label class="form-check-label" th:for="'cat' + ${cat.id}"
                                               th:text="${cat.name}"></label>
                                    </div>
                                </div>
                            </div>
                            <div id="categoryError" class="text-danger small mt-1 d-none">Оберіть принаймні одну категорію</div>
                        </div>

                        <!-- Only for PROVIDER -->
                        <div sec:authorize="hasRole('PROVIDER')" class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="acceptsApplications"
                                   id="acceptsApps"
                                   th:checked="${announcement == null || announcement.acceptsApplications}">
                            <label class="form-check-label" for="acceptsApps">Приймати заявки від ВПО</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check2 me-2"></i>Зберегти
                            </button>
                            <a href="/cabinet" class="btn btn-outline-secondary">Скасувати</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const checked = document.querySelectorAll('.category-check:checked').length;
    const errorEl = document.getElementById('categoryError');
    if (checked === 0) {
        e.preventDefault();
        errorEl.classList.remove('d-none');
    } else {
        errorEl.classList.add('d-none');
    }
});
</script>
</main>
</body>
</html>
