<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}"
      lang="uk">
<head>
    <title>Скарги &mdash; Адмін</title>
</head>
<body>
<main>
<div class="container py-4">
    <h3 class="fw-bold mb-4"><i class="bi bi-flag me-2 text-danger"></i>Скарги</h3>
    <div th:if="${#lists.isEmpty(complaints)}" class="text-center py-5">
        <p class="text-muted">Немає скарг</p>
    </div>
    <div class="row g-3" th:unless="${#lists.isEmpty(complaints)}">
        <div th:each="c : ${complaints}" class="col-12">
            <div th:class="${c.status == 'PENDING'} ? 'card shadow-sm border-warning' : 'card shadow-sm border-0 opacity-75'">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="fw-bold" th:text="${c.announcement.title}">Оголошення</h6>
                            <p class="text-muted small mb-1">
                                Скаржник: <span th:text="${c.complainant.fullName}"></span>
                            </p>
                            <p class="mb-1" th:text="${c.reason}"></p>
                            <small class="text-muted" th:text="${#temporals.format(c.createdAt, 'dd.MM.yyyy')}"></small>
                        </div>
                        <div th:if="${c.status == 'PENDING'}" class="d-flex gap-2">
                            <form th:action="@{/admin/complaints/{id}/block(id=${c.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Заблокувати оголошення?')">
                                    <i class="bi bi-slash-circle me-1"></i>Заблокувати
                                </button>
                            </form>
                            <form th:action="@{/admin/complaints/{id}/dismiss(id=${c.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-secondary btn-sm">
                                    <i class="bi bi-x me-1"></i>Відхилити
                                </button>
                            </form>
                        </div>
                        <span th:unless="${c.status == 'PENDING'}" class="badge bg-secondary">Розглянуто</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
