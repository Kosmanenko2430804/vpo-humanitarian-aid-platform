<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>
<div th:fragment="sidebar" class="col-md-3">
    <div class="card shadow-sm mb-4">
        <div class="card-body text-center p-4">
            <h6 class="fw-bold" th:text="${user.fullName}"></h6>
            <p class="text-muted small mb-0" th:text="${user.email}"></p>
        </div>
        <ul class="list-group list-group-flush sidebar-nav">
            <li th:classappend="${requestURI == '/admin/moderation'} ? 'active-item'" class="list-group-item">
                <a href="/admin/moderation" class="text-decoration-none text-dark">
                    Модерація
                    <span th:if="${pendingCount != null and pendingCount > 0}"
                          class="badge bg-warning text-dark rounded-pill float-end"
                          th:text="${pendingCount}"></span>
                </a>
            </li>
            <li th:classappend="${requestURI == '/admin/complaints'} ? 'active-item'" class="list-group-item">
                <a href="/admin/complaints" class="text-decoration-none text-dark">
                    Скарги
                    <span th:if="${complaintsCount != null and complaintsCount > 0}"
                          class="badge bg-danger rounded-pill float-end"
                          th:text="${complaintsCount}"></span>
                </a>
            </li>
            <li th:classappend="${requestURI == '/admin/users'} ? 'active-item'" class="list-group-item">
                <a href="/admin/users" class="text-decoration-none text-dark">Користувачі</a>
            </li>
            <li class="list-group-item">
                <form th:action="@{/auth/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-link text-decoration-none text-danger p-0">Вийти</button>
                </form>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
